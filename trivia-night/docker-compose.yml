# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: trivia_night
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: trivia_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://trivia:trivia_secret@db:5432/trivia_night
      JWT_SECRET: change_this_in_production_please
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      MAX_PLAYERS: 120
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_SERVER_URL: http://localhost:3001
    depends_on:
      - server

volumes:
  pgdata:
